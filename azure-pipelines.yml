trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'

- script: npm install
  displayName: 'Install Dependencies'

- script: npm run build
  displayName: 'Build Application'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'dist'
    ArtifactName: 'website'
    publishLocation: 'Container'